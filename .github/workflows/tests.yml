name: 🧪 Tests

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck on shell scripts and git hooks
        run: |
          shellcheck hooks/claude-code/pre-commit-recap.sh
          shellcheck hooks/git/prepare-commit-msg hooks/git/commit-msg
          shellcheck scripts/build-skill.sh scripts/recap-log.sh scripts/test-hooks.sh

  smoke-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Run smoke tests
        run: bash scripts/test-hooks.sh
      - name: Build skill bundle
        run: bash scripts/build-skill.sh
      - name: Verify bundle structure
        run: |
          unzip -l dist/git-ai-trace.skill
          unzip -p dist/git-ai-trace.skill git-ai-trace/SKILL.md | head -3
